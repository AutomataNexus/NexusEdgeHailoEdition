name: Release

on:
  push:
    tags:
      - 'v*'
      - '!v*-pi4-*'   # pi4 variants build via release-pi4-bullseye[-armhf].yml; keep them off the main release
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  attestations: write
  packages: write
  actions: read

env:
  CARGO_TERM_COLOR: always
  CARGO_NET_GIT_FETCH_WITH_CLI: true
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PRIVATE_REPO: AutomataNexus/NexusEdge-HailoCommunity

jobs:
  test:
    name: Pre-release checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ env.PRIVATE_REPO }}
          token: ${{ secrets.PROJECTOPERATIONS }}

      - name: Configure git auth for private deps
        run: git config --global url."https://${{ secrets.PROJECTOPERATIONS }}@github.com/".insteadOf "https://github.com/"

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libwebkit2gtk-4.1-dev libgtk-3-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev libappindicator3-dev librsvg2-dev

      - name: Run tests
        run: cargo test --workspace
        env:
          OWM_API_KEY: ${{ secrets.OWM_API_KEY }}
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}

      - name: Run clippy
        run: cargo clippy --workspace -- -D warnings
        env:
          OWM_API_KEY: ${{ secrets.OWM_API_KEY }}
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt
      - run: cargo +nightly fmt --all -- --check

  wasm:
    name: Build WASM frontend
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ env.PRIVATE_REPO }}
          token: ${{ secrets.PROJECTOPERATIONS }}

      - name: Configure git auth for private deps
        run: git config --global url."https://${{ secrets.PROJECTOPERATIONS }}@github.com/".insteadOf "https://github.com/"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          key: wasm

      - name: Install Trunk
        run: cargo install trunk@0.21.12 --locked

      - name: Stub wasm-opt (Trunk ignores wasm_opt=false, rustc LTO handles optimization)
        run: |
          mkdir -p "$HOME/.cache/trunk/wasm-opt-version_116/bin"
          printf '#!/bin/sh\nfor a in "$@"; do case "$a" in --output=*) o="${a#--output=}";; -*);; *) i="$a";; esac; done\ncp "$i" "$o"\n' > "$HOME/.cache/trunk/wasm-opt-version_116/bin/wasm-opt"
          chmod +x "$HOME/.cache/trunk/wasm-opt-version_116/bin/wasm-opt"

      - name: Build WASM frontend
        run: trunk build --release

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: wasm-dist
          path: dist/

  build-pi5:
    name: Build pi5-bookworm-aarch64
    needs: [test, wasm]
    runs-on: ubuntu-24.04-arm
    container: debian:bookworm
    outputs:
      digest: ${{ steps.hash.outputs.digest }}
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ env.PRIVATE_REPO }}
          token: ${{ secrets.PROJECTOPERATIONS }}

      - name: Install build dependencies
        run: |
          rm -f /etc/apt/apt.conf.d/docker-clean
          apt-get update -qq
          apt-get install -y -qq curl build-essential pkg-config git
          apt-get install -y -qq libwebkit2gtk-4.1-dev libgtk-3-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev libappindicator3-dev librsvg2-dev libssl-dev
          apt-get install -y -qq libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev libgstreamer-plugins-bad1.0-dev libgstreamer-gl1.0-0
          apt-get install -y -qq libxcb-render0-dev libxcb-shm0-dev libepoxy-dev libx11-dev libxcursor-dev libxkbcommon-dev libxi-dev libxrandr-dev
          apt-get install -y -qq libsecret-1-dev libgcrypt20-dev libnghttp2-dev libbrotli-dev libwebp-dev libicu-dev
          apt-get install -y -qq libxslt1-dev libxml2-dev libffi-dev libpng-dev libjpeg-dev libfontconfig-dev libpixman-1-dev libgraphite2-dev
          apt-get install -y -qq libstdc++-12-dev

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Configure git auth for private deps
        run: git config --global url."https://${{ secrets.PROJECTOPERATIONS }}@github.com/".insteadOf "https://github.com/"

      - name: Download WASM dist
        uses: actions/download-artifact@v4
        with:
          name: wasm-dist
          path: dist

      - name: Create HailoRT stub library
        run: |
          cat > /tmp/hailort_stub.c << 'STUBEOF'
          void HailoRTStatusStringsGet(void){}
          void hailo_configure_device(void){}
          void hailo_configure_vdevice(void){}
          void hailo_create_hef_buffer(void){}
          void hailo_create_input_vstreams(void){}
          void hailo_create_output_vstreams(void){}
          void hailo_create_vdevice(void){}
          void hailo_get_device_architecture(void){}
          void hailo_get_fw_version(void){}
          void hailo_get_input_vstream_frame_size(void){}
          void hailo_get_output_vstream_frame_size(void){}
          void hailo_hef_free(void){}
          void hailo_init_hef(void){}
          void hailo_infer(void){}
          void hailo_make_input_vstream_params(void){}
          void hailo_make_output_vstream_params(void){}
          void hailo_release_device(void){}
          void hailo_release_hef(void){}
          void hailo_release_input_vstream(void){}
          void hailo_release_input_vstreams(void){}
          void hailo_release_output_vstream(void){}
          void hailo_release_output_vstreams(void){}
          void hailo_release_vdevice(void){}
          void hailo_scan_devices(void){}
          void hailo_set_input_vstreams(void){}
          void hailo_set_output_vstreams(void){}
          void hailo_vstream_read_raw_buffer(void){}
          void hailo_vstream_write_raw_buffer(void){}
          void hailo_get_chip_temperature(void){}
          void hailo_get_library_version(void){}
          void hailo_get_physical_devices(void){}
          void hailo_get_throttling_state(void){}
          void hailo_power_measurement(void){}
          STUBEOF
          gcc -shared -o /usr/lib/libhailort.so /tmp/hailort_stub.c

      - name: Build release binary
        run: |
          . "$HOME/.cargo/env"
          RUSTFLAGS="-C link-args=-Wl,--allow-shlib-undefined" cargo build --release -p nexusedge-tauri

      - name: Package binary
        run: |
          mkdir -p release
          cp target/release/nexusedge-tauri release/nexusedge-hailoedition
          cd release
          tar czf nexusedge-hailoedition-pi5-bookworm-aarch64.tar.gz nexusedge-hailoedition
          sha256sum nexusedge-hailoedition-pi5-bookworm-aarch64.tar.gz > nexusedge-hailoedition-pi5-bookworm-aarch64.tar.gz.sha256

      - name: Compute digest for SLSA
        id: hash
        run: |
          cd release
          DIGEST=$(sha256sum nexusedge-hailoedition-pi5-bookworm-aarch64.tar.gz | base64 -w0)
          echo "digest=$DIGEST" >> $GITHUB_OUTPUT

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: release/nexusedge-hailoedition-pi5-bookworm-aarch64.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nexusedge-hailoedition-pi5-bookworm-aarch64
          path: |
            release/nexusedge-hailoedition-pi5-bookworm-aarch64.tar.gz
            release/nexusedge-hailoedition-pi5-bookworm-aarch64.tar.gz.sha256



  build-pi4:
    name: Build pi4-bookworm-aarch64
    needs: [test, wasm]
    runs-on: ubuntu-24.04-arm
    container: debian:bookworm
    outputs:
      digest: ${{ steps.hash.outputs.digest }}
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ env.PRIVATE_REPO }}
          token: ${{ secrets.PROJECTOPERATIONS }}

      - name: Install build dependencies
        run: |
          rm -f /etc/apt/apt.conf.d/docker-clean
          apt-get update -qq
          apt-get install -y -qq curl build-essential pkg-config git
          apt-get install -y -qq libwebkit2gtk-4.1-dev libgtk-3-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev libappindicator3-dev librsvg2-dev libssl-dev
          apt-get install -y -qq libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev libgstreamer-plugins-bad1.0-dev libgstreamer-gl1.0-0
          apt-get install -y -qq libxcb-render0-dev libxcb-shm0-dev libepoxy-dev libx11-dev libxcursor-dev libxkbcommon-dev libxi-dev libxrandr-dev
          apt-get install -y -qq libsecret-1-dev libgcrypt20-dev libnghttp2-dev libbrotli-dev libwebp-dev libicu-dev
          apt-get install -y -qq libxslt1-dev libxml2-dev libffi-dev libpng-dev libjpeg-dev libfontconfig-dev libpixman-1-dev libgraphite2-dev
          apt-get install -y -qq libstdc++-12-dev

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Configure git auth for private deps
        run: git config --global url."https://${{ secrets.PROJECTOPERATIONS }}@github.com/".insteadOf "https://github.com/"

      - name: Download WASM dist
        uses: actions/download-artifact@v4
        with:
          name: wasm-dist
          path: dist

      - name: Create HailoRT stub library
        run: |
          cat > /tmp/hailort_stub.c << 'STUBEOF'
          void HailoRTStatusStringsGet(void){}
          void hailo_configure_device(void){}
          void hailo_configure_vdevice(void){}
          void hailo_create_hef_buffer(void){}
          void hailo_create_input_vstreams(void){}
          void hailo_create_output_vstreams(void){}
          void hailo_create_vdevice(void){}
          void hailo_get_device_architecture(void){}
          void hailo_get_fw_version(void){}
          void hailo_get_input_vstream_frame_size(void){}
          void hailo_get_output_vstream_frame_size(void){}
          void hailo_hef_free(void){}
          void hailo_init_hef(void){}
          void hailo_infer(void){}
          void hailo_make_input_vstream_params(void){}
          void hailo_make_output_vstream_params(void){}
          void hailo_release_device(void){}
          void hailo_release_hef(void){}
          void hailo_release_input_vstream(void){}
          void hailo_release_input_vstreams(void){}
          void hailo_release_output_vstream(void){}
          void hailo_release_output_vstreams(void){}
          void hailo_release_vdevice(void){}
          void hailo_scan_devices(void){}
          void hailo_set_input_vstreams(void){}
          void hailo_set_output_vstreams(void){}
          void hailo_vstream_read_raw_buffer(void){}
          void hailo_vstream_write_raw_buffer(void){}
          void hailo_get_chip_temperature(void){}
          void hailo_get_library_version(void){}
          void hailo_get_physical_devices(void){}
          void hailo_get_throttling_state(void){}
          void hailo_power_measurement(void){}
          STUBEOF
          gcc -shared -o /usr/lib/libhailort.so /tmp/hailort_stub.c

      - name: Build release binary
        run: |
          . "$HOME/.cargo/env"
          RUSTFLAGS="-C link-args=-Wl,--allow-shlib-undefined" cargo build --release -p nexusedge-tauri

      - name: Package binary
        run: |
          mkdir -p release
          cp target/release/nexusedge-tauri release/nexusedge-hailoedition
          cd release
          tar czf nexusedge-hailoedition-pi4-bookworm-aarch64.tar.gz nexusedge-hailoedition
          sha256sum nexusedge-hailoedition-pi4-bookworm-aarch64.tar.gz > nexusedge-hailoedition-pi4-bookworm-aarch64.tar.gz.sha256

      - name: Compute digest for SLSA
        id: hash
        run: |
          cd release
          DIGEST=$(sha256sum nexusedge-hailoedition-pi4-bookworm-aarch64.tar.gz | base64 -w0)
          echo "digest=$DIGEST" >> $GITHUB_OUTPUT

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: release/nexusedge-hailoedition-pi4-bookworm-aarch64.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nexusedge-hailoedition-pi4-bookworm-aarch64
          path: |
            release/nexusedge-hailoedition-pi4-bookworm-aarch64.tar.gz
            release/nexusedge-hailoedition-pi4-bookworm-aarch64.tar.gz.sha256

  build-x86:
    name: Build x86_64-linux
    needs: [test, wasm]
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.hash.outputs.digest }}
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ env.PRIVATE_REPO }}
          token: ${{ secrets.PROJECTOPERATIONS }}

      - name: Configure git auth for private deps
        run: git config --global url."https://${{ secrets.PROJECTOPERATIONS }}@github.com/".insteadOf "https://github.com/"

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: x86_64

      - name: Download WASM dist
        uses: actions/download-artifact@v4
        with:
          name: wasm-dist
          path: dist

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libwebkit2gtk-4.1-dev libgtk-3-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev libappindicator3-dev librsvg2-dev

      - name: Build release binary
        run: cargo build --release -p nexusedge-tauri

      - name: Package binary
        run: |
          mkdir -p release
          cp target/release/nexusedge-tauri release/nexusedge-hailoedition
          cd release
          tar czf nexusedge-hailoedition-x86_64-linux.tar.gz nexusedge-hailoedition
          sha256sum nexusedge-hailoedition-x86_64-linux.tar.gz > nexusedge-hailoedition-x86_64-linux.tar.gz.sha256

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: release/nexusedge-hailoedition-x86_64-linux.tar.gz

      - name: Compute digest for SLSA
        id: hash
        run: |
          cd release
          DIGEST=$(sha256sum nexusedge-hailoedition-x86_64-linux.tar.gz | base64 -w0)
          echo "digest=$DIGEST" >> $GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nexusedge-hailoedition-x86_64-linux
          path: |
            release/nexusedge-hailoedition-x86_64-linux.tar.gz
            release/nexusedge-hailoedition-x86_64-linux.tar.gz.sha256

  package-models:
    name: Package HEF models
    needs: [test]
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.hash.outputs.digest }}
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ env.PRIVATE_REPO }}
          token: ${{ secrets.PROJECTOPERATIONS }}

      - name: Configure git auth for private deps
        run: git config --global url."https://${{ secrets.PROJECTOPERATIONS }}@github.com/".insteadOf "https://github.com/"

      - name: Package all embedded HEF models
        run: |
          mkdir -p release-models
          cp crates/nexusedge-shell-core/src/embedded_models/*.nc release-models/
          cd release-models
          tar czf nexusedge-hailo-models.tar.gz *.nc
          sha256sum nexusedge-hailo-models.tar.gz > nexusedge-hailo-models.tar.gz.sha256
          echo "$(ls *.nc | wc -l) models packaged"

      - name: Compute digest for SLSA
        id: hash
        run: |
          cd release-models
          DIGEST=$(sha256sum nexusedge-hailo-models.tar.gz | base64 -w0)
          echo "digest=$DIGEST" >> $GITHUB_OUTPUT

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: release-models/nexusedge-hailo-models.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nexusedge-hailo-models
          path: |
            release-models/nexusedge-hailo-models.tar.gz
            release-models/nexusedge-hailo-models.tar.gz.sha256

  docker:
    name: Docker image
    needs: [build-pi5, build-x86]
    runs-on: ubuntu-latest
    outputs:
      digest-amd64: ${{ steps.docker-push-amd64.outputs.digest }}
      digest-arm64: ${{ steps.docker-push-arm64.outputs.digest }}
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ env.PRIVATE_REPO }}
          token: ${{ secrets.PROJECTOPERATIONS }}

      - name: Download x86_64 binary
        uses: actions/download-artifact@v4
        with:
          name: nexusedge-hailoedition-x86_64-linux
          path: release-x86

      - name: Download Pi5 ARM64 binary
        uses: actions/download-artifact@v4
        with:
          name: nexusedge-hailoedition-pi5-bookworm-aarch64
          path: release-arm64

      - name: Download WASM dist
        uses: actions/download-artifact@v4
        with:
          name: wasm-dist
          path: dist

      - name: Extract binaries
        run: |
          cd release-x86 && tar xzf nexusedge-hailoedition-x86_64-linux.tar.gz
          mkdir -p ../target/release
          cp nexusedge-hailoedition ../target/release/nexusedge-tauri
          cd ../release-arm64 && tar xzf nexusedge-hailoedition-pi5-bookworm-aarch64.tar.gz
          mkdir -p ../target/release-arm64
          cp nexusedge-hailoedition ../target/release-arm64/nexusedge-tauri

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU for multi-platform builds
        uses: docker/setup-qemu-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build and push Docker image (amd64)
        id: docker-push-amd64
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/automatanexus/nexusedge-hailoedition:${{ steps.version.outputs.tag }}-amd64

      - name: Build and push Docker image (arm64)
        id: docker-push-arm64
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/arm64
          build-args: |
            BINARY_PATH=target/release-arm64/nexusedge-tauri
          tags: |
            ghcr.io/automatanexus/nexusedge-hailoedition:${{ steps.version.outputs.tag }}-arm64

      - name: Create and push multi-arch manifest
        run: |
          docker buildx imagetools create -t ghcr.io/automatanexus/nexusedge-hailoedition:${{ steps.version.outputs.tag }} \
            ghcr.io/automatanexus/nexusedge-hailoedition:${{ steps.version.outputs.tag }}-amd64 \
            ghcr.io/automatanexus/nexusedge-hailoedition:${{ steps.version.outputs.tag }}-arm64
          docker buildx imagetools create -t ghcr.io/automatanexus/nexusedge-hailoedition:latest \
            ghcr.io/automatanexus/nexusedge-hailoedition:${{ steps.version.outputs.tag }}-amd64 \
            ghcr.io/automatanexus/nexusedge-hailoedition:${{ steps.version.outputs.tag }}-arm64

  # ════════════════════════════════════════════════════════════════════════
  # SLSA Level 3 Provenance — uses the official slsa-framework generator
  # Produces non-falsifiable, Sigstore-signed provenance on an isolated
  # builder that the repo owner cannot tamper with.
  # ════════════════════════════════════════════════════════════════════════
  helm:
    name: Helm chart
    needs: [docker]
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.push.outputs.digest }}
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ env.PRIVATE_REPO }}
          token: ${{ secrets.PROJECTOPERATIONS }}

      - name: Extract version
        id: version
        run: echo "tag=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Update Chart.yaml version
        run: |
          sed -i "s/^version:.*/version: ${{ steps.version.outputs.tag }}/" helm/nexusedge-hailoedition/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${{ steps.version.outputs.tag }}\"/" helm/nexusedge-hailoedition/Chart.yaml

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Log in to GHCR for Helm
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Package Helm chart
        run: helm package helm/nexusedge-hailoedition -d release-helm/

      - name: Push Helm chart to GHCR
        id: push
        run: |
          CHART_PKG=$(ls release-helm/*.tgz)
          OUTPUT=$(helm push "$CHART_PKG" oci://ghcr.io/automatanexus/charts 2>&1)
          echo "$OUTPUT"
          DIGEST=$(echo "$OUTPUT" | grep -oP 'Digest: \K\S+')
          echo "digest=$DIGEST" >> $GITHUB_OUTPUT

      - name: Upload chart artifact
        uses: actions/upload-artifact@v4
        with:
          name: nexusedge-helm-chart
          path: release-helm/*.tgz





  release:
    name: Create GitHub Release
    needs: [build-pi5, build-pi4, build-x86, package-models, docker, helm]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ env.PRIVATE_REPO }}
          token: ${{ secrets.PROJECTOPERATIONS }}

      - name: Download Pi5 artifact
        uses: actions/download-artifact@v4
        with:
          name: nexusedge-hailoedition-pi5-bookworm-aarch64
          path: artifacts/pi5

      - name: Download Pi4 artifact
        uses: actions/download-artifact@v4
        with:
          name: nexusedge-hailoedition-pi4-bookworm-aarch64
          path: artifacts/pi4

      - name: Download x86_64 artifact
        uses: actions/download-artifact@v4
        with:
          name: nexusedge-hailoedition-x86_64-linux
          path: artifacts/x86



      - name: Download HEF models artifact
        uses: actions/download-artifact@v4
        with:
          name: nexusedge-hailo-models
          path: artifacts/models

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
