name: Release Pi4 Bullseye (Headless)

on:
  push:
    tags:
      - 'v*-pi4-bullseye'
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  attestations: write
  actions: read

env:
  CARGO_TERM_COLOR: always
  CARGO_NET_GIT_FETCH_WITH_CLI: true
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PRIVATE_REPO: AutomataNexus/NexusEdge-Pi4Bullseye

jobs:
  build-pi4-bullseye:
    name: Build pi4-bullseye-aarch64 (headless, no Hailo)
    runs-on: ubuntu-24.04-arm
    container: debian:bullseye
    steps:
      - name: Install build dependencies
        run: |
          apt-get update -qq
          apt-get install -y -qq curl build-essential pkg-config git ca-certificates
          apt-get install -y -qq libssl-dev

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - uses: actions/checkout@v4
        with:
          repository: ${{ env.PRIVATE_REPO }}
          token: ${{ secrets.PROJECTOPERATIONS }}

      - name: Configure git auth for private deps
        run: git config --global url."https://${{ secrets.ProjectOperations }}@github.com/".insteadOf "https://github.com/"

      - name: Override cargo config (native build, no sysroot)
        run: |
          mkdir -p .cargo
          echo '[target.aarch64-unknown-linux-gnu]' > .cargo/config.toml
          echo 'linker = "gcc"' >> .cargo/config.toml

      - name: Create empty dist for include_dir
        run: mkdir -p dist && echo '<html><body>Headless mode</body></html>' > dist/index.html

      - name: Create HailoRT stub library
        run: |
          cat > /tmp/hailort_stub.c << 'STUBEOF'
          void HailoRTStatusStringsGet(void){}
          void hailo_configure_device(void){}
          void hailo_configure_vdevice(void){}
          void hailo_create_hef_buffer(void){}
          void hailo_create_input_vstreams(void){}
          void hailo_create_output_vstreams(void){}
          void hailo_create_vdevice(void){}
          void hailo_get_device_architecture(void){}
          void hailo_get_fw_version(void){}
          void hailo_get_input_vstream_frame_size(void){}
          void hailo_get_output_vstream_frame_size(void){}
          void hailo_hef_free(void){}
          void hailo_init_hef(void){}
          void hailo_infer(void){}
          void hailo_make_input_vstream_params(void){}
          void hailo_make_output_vstream_params(void){}
          void hailo_release_device(void){}
          void hailo_release_hef(void){}
          void hailo_release_input_vstream(void){}
          void hailo_release_input_vstreams(void){}
          void hailo_release_output_vstream(void){}
          void hailo_release_output_vstreams(void){}
          void hailo_release_vdevice(void){}
          void hailo_vdevice_infer(void){}
          STUBEOF
          gcc -shared -o /usr/lib/libhailort.so /tmp/hailort_stub.c
          ldconfig

      - name: Build headless release binary
        run: |
          export PATH="$HOME/.cargo/bin:$PATH"
          cargo build --release -p nexusedge-tauri --no-default-features --features headless
        env:
          OWM_API_KEY: ${{ secrets.OWM_API_KEY }}
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}

      - name: Package binary
        run: |
          mkdir -p release
          cp target/release/nexusedge-tauri release/nexusedge-hailoedition-headless
          strip release/nexusedge-hailoedition-headless || true
          cd release
          tar czf nexusedge-hailoedition-pi4-bullseye-headless-aarch64.tar.gz nexusedge-hailoedition-headless
          sha256sum nexusedge-hailoedition-pi4-bullseye-headless-aarch64.tar.gz > nexusedge-hailoedition-pi4-bullseye-headless-aarch64.tar.gz.sha256

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: release/nexusedge-hailoedition-pi4-bullseye-headless-aarch64.tar.gz

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/nexusedge-hailoedition-pi4-bullseye-headless-aarch64.tar.gz
            release/nexusedge-hailoedition-pi4-bullseye-headless-aarch64.tar.gz.sha256
          tag_name: ${{ github.ref_name }}
          name: "NexusEdge Pi4 Bullseye Headless — ${{ github.ref_name }}"
          body: |
            Pi 4 Bullseye headless binary (no Hailo NPU, no GUI).
            For field controllers running Raspbian Bullseye without Hailo hardware.
            SLSA Build L3 attested.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
