# Talos hardware-daemon config — On/Off boiler. One MegaBAS HAT at stack 0.
# Must live in the same directory as site.toml.

[server]
host = "127.0.0.1"
port = 6100

[polling]
interval_ms = 1000
timeout_ms = 500

[boards]
[boards.megabas]
enabled = true
stacks = [0]

[boards.megaind]
enabled = false

[boards.univin16]
enabled = false

[boards.relind16]
enabled = false

[boards.relind8]
enabled = false

[boards.uout16]
enabled = false

[i2c]
bus = 1
retry_count = 3
retry_delay_ms = 10

[logging]
level = "info"
file = "/var/log/nexusedge/hardware-daemon.log"

[aegisdb]
enabled = false
url = ""
interval_ms = 5000
node_name = "boiler-1"
